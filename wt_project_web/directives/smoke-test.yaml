# Smoke Test Configuration — template for post-merge smoke tests.
#
# These values are injected into the orchestration config.
# Customize in your project's wt/orchestration/config.yaml.

smoke:
  command: "pnpm test:smoke"
  timeout: 120          # seconds to wait for smoke test completion
  env:
    SMOKE_BASE_URL: "http://localhost:3002"
  fix_timeout: 300      # max seconds agent spends fixing a failed smoke
  retry: 1              # retries before escalating to human
